<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Netlify Form Detection</title>
  </head>
  <body>
    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="projectInformation"></textarea>
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
